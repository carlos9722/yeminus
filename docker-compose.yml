services:
  postgres:
    image: postgres:16-alpine
    container_name: serviceorders-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: serviceorders_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d serviceorders_db"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: