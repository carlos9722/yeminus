<section class="page">
  <a routerLink="/orders" class="back-link">← Volver al listado</a>
  <h1>{{ pageTitle() }}</h1>

  @if (isLoading()) {
    <p>Cargando orden...</p>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="form-card">
      <div class="field">
        <label for="description">Descripción <span class="required">*</span></label>
        <textarea
          id="description"
          rows="4"
          formControlName="description"
          placeholder="Detalle del trabajo a realizar"
        ></textarea>
      </div>

      <div class="field">
        <label for="technicianId">Técnico <span class="required">*</span></label>
        <select id="technicianId" formControlName="technicianId">
          <option [ngValue]="0" disabled>Seleccione un técnico</option>
          @for (tech of technicians(); track tech.id) {
            <option [ngValue]="tech.id">
              {{ tech.fullName }} — {{ tech.specialty }}
            </option>
          }
        </select>
      </div>

      <div class="field">
        <label for="clientId">Cliente <span class="required">*</span></label>
        <select id="clientId" formControlName="clientId">
          <option [ngValue]="0" disabled>Seleccione un cliente</option>
          @for (client of clients(); track client.id) {
            <option [ngValue]="client.id">
              {{ client.fullName }} — {{ client.identityDoc }}
            </option>
          }
        </select>
      </div>

      @if (isEditMode()) {
        <div class="field">
          <label for="status">Estado <span class="required">*</span></label>
          <select id="status" formControlName="status">
            @for (opt of statusOptions; track opt.value) {
              <option [ngValue]="opt.value">{{ opt.label }}</option>
            }
          </select>
        </div>
      }

      @if (errorMessage(); as error) {
        <p class="form-error" role="alert">{{ error }}</p>
      }

      <div class="actions">
        <button type="submit" class="btn-primary" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Guardando...' : 'Guardar' }}
        </button>
        <a routerLink="/orders" class="btn-secondary">Cancelar</a>
      </div>
    </form>
  }
</section>
