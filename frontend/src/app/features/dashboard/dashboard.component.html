<section class="dashboard">
  @if (isLoading()) {
    <p>Cargando...</p>
  } @else if (user(); as profile) {
    <h1>Bienvenido, {{ profile.fullName }}</h1>
    <p class="meta">Usuario: <strong>{{ profile.username }}</strong></p>
 
  } @else if (errorMessage(); as error) {
    <p class="error" role="alert">{{ error }}</p>
  }
</section>
